<div class="w-full max-w-2xl px-12 py-20 rounded-2xl border border-gray-200">
  <!-- Título -->
  <div class="mb-10">
    <h1 class="text-3xl font-semibold text-gray-900">Login admin RH</h1>
    <p class="text-sm text-gray-400 mt-2">Acesse sua conta para continuar</p>
  </div>

  <form [formGroup]="LoginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
    <!-- Email -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Email</label>
      <input
        formControlName="email"
        type="email"
        placeholder="usuario@dominio.com.br"
        class="w-full px-4 py-3.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 outline-none focus:border-gray-400 transition"
      />
    </div>

    <!-- Senha -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Senha</label>
      <input
        formControlName="password"
        type="password"
        placeholder="••••••••"
        class="w-full px-4 py-3.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 outline-none focus:border-gray-400 transition"
      />
    </div>

    <!-- Botão -->
    <button
      type="submit"
      [disabled]="LoginForm.invalid"
      class="w-full py-3.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium transition disabled:cursor-not-allowed mt-2"
    >
      Entrar
    </button>
  </form>
</div>
