<div class="max-w-md mx-auto mt-10 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Data</h1>
  </div>

  <form [formGroup]="RecordedForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <input
        formControlName="Matriculation"
        type="text"
        placeholder="Digite o Matriculation"
        class="w-full rounded-md border border-gray-300 px-4 py-2 text-gray-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
      />
    </div>

    <button
      type="submit"
      [disabled]="RecordedForm.invalid"
      class="w-full rounded-md bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-400"
    >
      Enviar
    </button>
  </form>
</div>
